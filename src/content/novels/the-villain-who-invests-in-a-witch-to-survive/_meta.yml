synopsis: | 
  Pada hari pertama masuk SMA, wali kelas Namito Kominato menyuruhnya duduk di belakang seorang gadis aneh yang mengenakan kantong kertas di kepalanya dan selalu basah kuyup oleh keringat.

  Namanya Samidare Kamiyama, seorang gadis yang sangat pemalu dengan kecemasan sosial yang parah. Pada akhirnya, dia bertemu Hinata Arai (ketua OSIS yang baik hati dan suka membantu, tapi sangat terobsesi dengan seragamnya) dan Harusame Amano (seorang gadis yang hanya berbicara di panel gadis penyihir di konvensi anime).

  Ketiga gadis malang namun cantik ini membentuk “klub percakapan”, membuka tirai kisah romansa remaja yang menyedihkan dan komedi ini!